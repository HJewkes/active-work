name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan all commits

      # Secret scanning — fail the build if a credential was ever committed.
      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Dependency audit — fail on any critical advisory (parity with brain).
      - name: Security audit
        run: pnpm audit --audit-level critical

      # tools/ sits outside the linted/typechecked src surface, so guard the
      # mining tooling with a syntax + pricing-table validity check. The full
      # eval-miner run is a local pre-merge gate (it needs the operator's
      # ~/.claude transcripts, which CI has no access to); its pure scoring math
      # is covered by the unit suite below.
      - name: Validate mining tools
        run: pnpm check:tools

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # Build the CLI before tests so the integration suite runs against a
      # prebuilt dist/cli.js rather than transpiling src via tsx on every spawn
      # (AW-12). This makes the runner deterministic — same code path as local
      # runs — and removes cold-tsx variance that flaked the first CI run.
      - name: Build CLI (for deterministic integration tests)
        run: pnpm build:cli

      # Run tests under a throwaway HOME so no test — including ones that spawn
      # the CLI as a subprocess — can touch a real home/config dir (AW-9). The
      # in-process sandbox lives in __tests__/setup/sandbox-home.ts; this is the
      # OS-level backstop that also covers spawned child processes.
      - name: Test (sandboxed HOME)
        run: |
          sandbox_home="$RUNNER_TEMP/aw-test-home"
          mkdir -p "$sandbox_home"
          HOME="$sandbox_home" XDG_CONFIG_HOME="$sandbox_home/.config" \
            XDG_DATA_HOME="$sandbox_home/.local/share" \
            XDG_STATE_HOME="$sandbox_home/.local/state" \
            pnpm test

      - name: Build
        run: pnpm build
